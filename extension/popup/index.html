<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    body {
      font-family: system-ui, sans-serif;
      width: 280px;
      padding: 16px;
      background: #0f0f0f;
      color: #e5e5e5;
      margin: 0;
    }
    h2 { margin: 0 0 12px; font-size: 15px; color: #fff; }
    label { display: block; font-size: 12px; color: #aaa; margin-bottom: 4px; }
    input {
      width: 100%;
      box-sizing: border-box;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 4px;
      color: #e5e5e5;
      padding: 6px 8px;
      font-size: 13px;
      margin-bottom: 12px;
    }
    button {
      width: 100%;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 8px;
      font-size: 13px;
      cursor: pointer;
    }
    button:hover { background: #1d4ed8; }
    #status { font-size: 12px; margin-top: 8px; color: #6b7280; }
  </style>
</head>
<body>
  <h2>FoggleBet Settings</h2>
  <label for="apiKey">API Key</label>
  <input type="password" id="apiKey" placeholder="Enter your API key" />
  <label for="apiUrl">API URL</label>
  <input type="text" id="apiUrl" placeholder="https://your-app.vercel.app" />
  <button id="save">Save</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
